name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build and verify artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and verify artifacts
        run: npm run ci

      - name: Upload built userscript
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: letterboxd-plus-${{ github.sha }}
          path: |
            dist/letterboxd-plus.user.js
            dist/letterboxd-plus.meta.js
          if-no-files-found: ignore
          retention-days: 14
